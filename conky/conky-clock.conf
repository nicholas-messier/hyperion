conky.config = {
    alignment = "top_right",
    gap_x = 20,
    gap_y = 20,

    update_interval = 2,
    total_run_times = 0,

    use_xft = true,
    font = "JetBrainsMono Nerd Font:size=12",
    use_spacer = "none",

    minimum_width = 320,
    maximum_width = 420,
    text_buffer_size = 4096,
    override_utf8_locale = true, 

    own_window = true,
    own_window_type = "desktop",
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_colour = "#000000",

    own_window_hints = "undecorated,sticky,skip_taskbar,skip_pager,below",

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    double_buffer = true,
};

conky.text = [[
${color #ffffff}${font JetBrainsMono Nerd Font:size=22}${time %I:%M %p}${font}
${color #add8e6}${time %A, %B %d %Y}${color}
${color #888888}--------------------------------${color}
${color #add8e6}India (IST):${color}       ${tztime Asia/Kolkata %I:%M %p}
${color #add8e6}Israel:${color}            ${tztime Asia/Jerusalem %I:%M %p}
${color #add8e6}Poland:${color}            ${tztime Europe/Warsaw %I:%M %p}
${color #add8e6}US Central:${color}        ${tztime America/Chicago %I:%M %p}
${color #888888}--------------------------------${color}
${color #add8e6}Weather (Laconia NH):${color}
${execpi 900 cat ~/.cache/wttr_laconia.txt}
${color #888888}--------------------------------${color}
${color #00ff00}Celtics: (${execi 1800 cat ~/.cache/celtics_record.txt})${color}
${execpi 1800 cat ~/.cache/celtics_next.txt}
]];
