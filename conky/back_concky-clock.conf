conky.config = {
    alignment = "top_right",
    gap_x = 20,
    gap_y = 20,

    update_interval = 2,
    total_run_times = 0,

    use_xft = true,
    font = "DejaVu Sans Mono:size=12",
    use_spacer = "none",

    minimum_width = 320,
    maximum_width = 320,

    own_window = true,
    own_window_type = "desktop",
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_colour = "#000000",

    own_window_hints = "undecorated,sticky,skip_taskbar,skip_pager,below",

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    double_buffer = true,
};

conky.text = [[
${color #add8e6}India (IST):${color}       ${tztime Asia/Kolkata %I:%M %p}
${color #add8e6}Israel:${color}            ${tztime Asia/Jerusalem %I:%M %p}
${color #add8e6}Poland:${color}            ${tztime Europe/Warsaw %I:%M %p}
${color #add8e6}US Eastern:${color}        ${tztime America/New_York %I:%M %p}
${color #add8e6}Today:${color}             ${time %A}

${color #add8e6}Weather (Laconia NH):${color}
${execi 900 curl -s "wttr.in/Laconia+NH?u&format=%a+%h+%C"}
${execi 900 curl -s "wttr.in/Laconia+NH?u&format=Temp:+%t"}
${execi 900 curl -s "wttr.in/Laconia+NH?m&format=Temp:+%t"}
${color #888888}--------------------------------${color}
${color #add8e6}Mint:${color}   ${execi 3600 lsb_release -ds}
${color #add8e6}Kernel:${color} ${kernel}
${color #add8e6}Memory:${color} ${mem} / ${memmax} (${memperc}%)
${color #888888}--------------------------------${color}
${color #add8e6}Plex:${color} \
${if_match "${execi 10 systemctl is-active plexmediaserver}" == "active"}\
${color green}active\
${else}\
${color red}inactive\
${endif}${color}
${color #add8e6}Pi-hole:${color} \
${if_match "${execi 10 pihole status | grep -o 'enabled'}" == "enabled"}\
${color green}enabled\
${else}\
${color red}disabled\
${endif}${color}
]];






