conky.config = {
    alignment = "top_right",
    gap_x = 360,
    gap_y = 20,

    update_interval = 2,
    total_run_times = 0,

    use_xft = true,
    font = "JetBrainsMono Nerd Font:size=12",
    use_spacer = "none",

    minimum_width = 320,
    maximum_width = 420,
    text_buffer_size = 4096,
    override_utf8_locale = true, 

    own_window = true,
    own_window_type = "desktop",
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_colour = "#000000",

    own_window_hints = "undecorated,sticky,skip_taskbar,skip_pager,below",

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    double_buffer = true,
};

conky.text = [[
${color #ffffff}${font JetBrainsMono Nerd Font:size=16}Hyperion${font}${color}
${color #888888}--------------------------------${color}
${color #add8e6}Uptime:${color} ${uptime_short}  ${color #add8e6}IP:${color} ${execi 60 ip -4 addr show | grep -oP 'inet \K[\d.]+' | grep -v 127.0.0.1 | head -1}
${color #add8e6}Mint:${color}   ${execi 3600 lsb_release -ds}
${color #add8e6}Kernel:${color} ${kernel}
${color #add8e6}CPU:${color}    ${cpu}% ${cpubar 6}
${color #add8e6}Temp:${color}   ${execi 5 sensors 2>/dev/null | awk '/Package id 0:/{gsub(/\+/,""); print $4}'}
${color #add8e6}Memory:${color} ${mem} / ${memmax} (${memperc}%)
${color #add8e6}Procs:${color}  ${running_processes} running / ${processes} total
${color #888888}--------------------------------${color}
${color #add8e6}Data (sdb):${color}  ${execi 30 df -H /media/nmessier/707f0cf6-cec7-4c37-9449-5fedb069bc87 | awk 'NR==2{print $4 " free / " $2}'}
${color #add8e6}Data (sdc):${color}  ${execi 30 df -H /media/nmessier/543ad329-5dd3-498a-adc8-544ca8d68dac1 | awk 'NR==2{print $4 " free / " $2}'}
${color #add8e6}Ext (sdd):${color}   ${execi 30 mountpoint -q /media/nmessier/NicksData 2>/dev/null && df -H /media/nmessier/NicksData | awk 'NR==2{print $4 " free / " $2}' || echo "disconnected"}
${color #888888}--------------------------------${color}
${color #add8e6}Plex:${color} \
${if_match "${execi 10 systemctl is-active plexmediaserver}" == "active"}\
${color green}active\
${else}\
${color red}inactive\
${endif}${color}
${color #add8e6}Pi-hole:${color} \
${if_match "${execi 10 pihole status | grep -o 'enabled'}" == "enabled"}\
${color green}enabled\
${else}\
${color red}disabled\
${endif}${color}
${color #add8e6}Minecraft:${color} \
${if_match "${execi 10 systemctl is-active minecraft.service}" == "active"}\
${color green}running\
${else}\
${color red}stopped\
${endif}${color}
${color #add8e6}ErsatzTV:${color} \
${if_match "${execi 10 docker inspect -f '{{.State.Running}}' ersatztv 2>/dev/null}" == "true"}\
${color green}running\
${else}\
${color red}stopped\
${endif}${color}
${color #add8e6}Converting:${color} \
${if_match "${execi 10 pgrep -c ffmpeg 2>/dev/null || echo 0}" != "0"}\
${color green}active (${execi 10 pgrep -c ffmpeg 2>/dev/null || echo 0} jobs)\
${else}\
${color #888888}idle\
${endif}${color}
]];
