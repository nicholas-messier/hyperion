conky.config = {
    alignment = "top_left",
    gap_x = 20,
    gap_y = 20,

    update_interval = 1800,  -- update every 30 minutes
    total_run_times = 0,

    use_xft = true,
    font = "DejaVu Sans Mono:size=11",
    use_spacer = "none",

    minimum_width = 240,
    maximum_width = 400,

